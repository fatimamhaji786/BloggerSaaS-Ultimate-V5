<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Tool Manager • BloggerSaaS Ultimate V2</title>

<link rel="stylesheet"
href="../assets/css/dashboard.css">

<link rel="stylesheet"
href="../assets/css/tool-manager.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="dashboard">

<!-- ==========================
Sidebar
=========================== -->

<aside class="sidebar">

<h2>BloggerSaaS V2</h2>

<ul>

<li>
<a href="dashboard.html">
<i class="fas fa-home"></i>
Dashboard
</a>
</li>

<li class="active">
<a href="#">
<i class="fas fa-toolbox"></i>
Tool Manager
</a>
</li>

<li>
<a href="user-manager.html">
<i class="fas fa-users"></i>
User Manager
</a>
</li>

<li>
<a href="ai-center.html">
<i class="fas fa-robot"></i>
AI Center
</a>
</li>

<li>
<a href="firebase-center.html">
<i class="fas fa-fire"></i>
Firebase Center
</a>
</li>

<li>
<a href="analytics.html">
<i class="fas fa-chart-line"></i>
Analytics
</a>
</li>

<li>
<a href="settings.html">
<i class="fas fa-cog"></i>
Settings
</a>
</li>

</ul>

</aside>

<!-- ==========================
Main Content
=========================== -->

<main class="content">

<header class="topbar">

<div>

<h1>
<i class="fas fa-toolbox"></i>
Tool Manager
</h1>

<p>
Manage all website tools
</p>

</div>

<div>

<input
type="text"
id="searchTool"
placeholder="Search tools...">

<button id="addToolBtn">

<i class="fas fa-plus"></i>

Add Tool

</button>

</div>

  </header>

  <!-- ==========================
Dashboard Cards
=========================== -->

<section class="cards">

<div class="card">

<i class="fas fa-toolbox card-icon"></i>

<h3>Total Tools</h3>

<p id="totalTools">0</p>

</div>

<div class="card">

<i class="fas fa-folder-open card-icon"></i>

<h3>Categories</h3>

<p id="totalCategories">0</p>

</div>

<div class="card">

<i class="fas fa-check-circle card-icon"></i>

<h3>Active Tools</h3>

<p id="activeTools">0</p>

</div>

<div class="card">

<i class="fas fa-clock card-icon"></i>

<h3>Last Updated</h3>

<p id="lastUpdated">--</p>

</div>

</section>

<!-- ==========================
Tool List
=========================== -->

<section class="tool-section">

<div class="section-header">

<h2>

<i class="fas fa-list"></i>

All Tools

</h2>

</div>

<div id="toolGrid" class="tool-grid">

<!-- Firebase tools load here -->

</div>

</section>

<!-- ==========================
Add / Edit Tool Popup
=========================== -->

<div id="toolModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<h2 id="modalTitle">

<i class="fas fa-plus-circle"></i>

Add New Tool

</h2>

<label>Tool Name</label>

<input
type="text"
id="toolName"
placeholder="Enter tool name">

<label>Category</label>

<input
type="text"
id="toolCategory"
placeholder="Utility / SEO / PDF">

<label>Tool URL</label>

<input
type="text"
id="toolURL"
placeholder="https://yourtool.com">

<label>Description</label>

<textarea
id="toolDescription"
placeholder="Tool description"></textarea>

<button id="saveToolBtn">

<i class="fas fa-save"></i>

Save Tool

</button>

</div>

  </div>

  <!-- ==========================
End Main Content
=========================== -->

</main>

</div>

<!-- ==========================
Firebase Libraries
=========================== -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<!-- ==========================
Tool Manager Script
=========================== -->

<script src="../assets/js/tool-manager.js"></script>

</body>

  </html>
